<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Fudge Ur Uncle</title>

    <!-- PWA manifest + theme -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#e77a1b" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- iOS Add-to-Home-Screen support: Safari ignores manifest icons and
         needs apple-touch-icon + apple-mobile-web-app-* meta tags. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FuU" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #060810; }
      body {
        font-family: "IBM Plex Sans", -apple-system, sans-serif;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
      }
      /* When launched as a PWA (Add to Home Screen), make the app feel
         native: lock the body to the viewport so it can't scroll, and
         move scroll into #root. That kills the URL-bar-resize jitter,
         pull-to-refresh, and the rubber-band effect on iOS — content
         still scrolls inside #root with momentum. The media query keeps
         the browser experience untouched. */
      @media (display-mode: standalone) {
        html, body {
          height: 100%;
          overflow: hidden;
          overscroll-behavior: none;
        }
        body {
          position: fixed;
          inset: 0;
          /* Match the app's content bg (colors.bg) so the safe-area regions
             — the dynamic-island top strip and the home-indicator bottom
             strip — blend with the inner content instead of showing as
             black bands. With status-bar-style=default iOS draws the
             status bar above the page, so we don't pad-top here. The
             bottom inset still needs padding so content (and our bottom
             nav bar) doesn't sit under the home indicator. */
          background: #fdfbf7;
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
        #root {
          height: 100%;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          overscroll-behavior: contain;
        }
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0a0e17; }
      ::-webkit-scrollbar-thumb { background: #2a3a52; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a4f6f; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the service worker after load so it doesn't block first paint.
      // Skipped under localhost dev to avoid stale-cache surprises while iterating.
      if ("serviceWorker" in navigator && location.hostname !== "localhost") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => { /* offline-only is fine */ });
        });
      }
    </script>
  </body>
</html>
